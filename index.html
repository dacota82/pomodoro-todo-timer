<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e1e22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pomodoro · Todo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <section class="timer-zone timer-card mode-focus" aria-labelledby="timer-heading">
      <h2 id="timer-heading" class="visually-hidden">뽀모도로 타이머</h2>

      <header class="brand">
        <p class="brand__title">POMODORO TIMER</p>
        <p class="brand__subtitle">AESTHETIC</p>
        <p class="app-version" aria-label="앱 버전">v1.0.0</p>
        <p class="today-stats" aria-live="polite">
          오늘 완료 <span id="today-count">0</span>
        </p>
      </header>

      <p id="active-task-label" class="active-task-label">집중할 할일을 선택하세요</p>

      <div id="flip-clock" class="flip-clock-mount" aria-hidden="true"></div>
      <div
        id="timer-display"
        class="visually-hidden"
        role="timer"
        aria-live="polite"
        aria-atomic="true"
      >25:00</div>

      <p id="mode-label" class="mode-label">FOCUS</p>

      <nav class="mode-tabs" aria-label="타이머 모드">
        <button type="button" class="mode-tab active" data-mode="focus">집중</button>
        <button type="button" class="mode-tab" data-mode="shortBreak">휴식</button>
        <button type="button" class="mode-tab" data-mode="longBreak">긴 휴식</button>
      </nav>

      <div class="timer-controls">
        <button type="button" id="btn-start" class="btn btn-primary" disabled aria-label="타이머 시작">시작</button>
        <button type="button" id="btn-pause" class="btn btn-ghost" disabled aria-label="타이머 일시정지">일시정지</button>
        <button type="button" id="btn-reset" class="btn btn-ghost" aria-label="타이머 리셋">리셋</button>
      </div>

      <p id="timer-hint" class="timer-hint" role="status" aria-live="polite"></p>
    </section>

    <section class="todo-zone" aria-labelledby="todo-heading">
      <div class="todo-zone__handle" aria-hidden="true"></div>
      <h2 id="todo-heading" class="todo-heading">TO-DO</h2>

      <form id="todo-form" class="todo-form" aria-label="할 일 추가">
        <input
          type="text"
          id="todo-input"
          class="todo-input"
          placeholder="할 일을 입력하세요"
          maxlength="200"
          autocomplete="off"
          aria-label="할 일을 입력하세요"
        >
        <button type="submit" class="btn btn-add">+ 추가</button>
      </form>

      <nav class="todo-filters" aria-label="할일 필터">
        <button type="button" class="filter-tab active" data-filter="all">전체</button>
        <button type="button" class="filter-tab" data-filter="active">진행중</button>
        <button type="button" class="filter-tab" data-filter="completed">완료</button>
      </nav>

      <div class="todo-body">
        <ul id="todo-list" class="todo-list" aria-label="할일 목록"></ul>
        <p id="todo-empty" class="todo-empty">할일이 없습니다</p>
      </div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
